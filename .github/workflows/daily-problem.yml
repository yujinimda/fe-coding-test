name: "🎲 오늘의 문제 자동 생성"

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  generate-problem:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: 레포 체크아웃
        uses: actions/checkout@v4

      - name: 어제 문제 정답 공개 + 오늘 문제 생성
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");
            const fence = "```";

            function assert(condition, message) {
              if (!condition) throw new Error(message);
            }

            function normalize(value) {
              return String(value || "")
                .replace(/\r\n/g, "\n")
                .replace(/\r/g, "\n")
                .trim();
            }

            function validateProblem(problem) {
              assert(problem && typeof problem === "object", "문제 JSON이 객체가 아닙니다.");
              assert(typeof problem.title === "string" && problem.title.trim().length >= 5, "title이 비어있거나 너무 짧습니다.");
              assert(typeof problem.description === "string" && problem.description.trim().length >= 20, "description이 비어있거나 너무 짧습니다.");
              assert(typeof problem.code === "string" && problem.code.trim().length >= 30, "code가 비어있거나 너무 짧습니다.");
              assert(Array.isArray(problem.requirements), "requirements가 배열이 아닙니다.");
              assert(problem.requirements.length >= 3 && problem.requirements.length <= 4, "requirements는 3~4개여야 합니다.");
              assert(problem.requirements.every((r) => typeof r === "string" && r.trim()), "requirements 안에 빈 항목이 있습니다.");
              assert(typeof problem.hint === "string" && problem.hint.trim().length >= 5, "hint가 비어있거나 너무 짧습니다.");
              assert(typeof problem.referenceSolution === "string" && problem.referenceSolution.trim().length >= 30, "referenceSolution이 비어있거나 너무 짧습니다.");

              const textAll = [
                problem.title,
                problem.description,
                problem.code,
                problem.requirements.join("\n"),
                problem.referenceSolution,
              ].join("\n").toLowerCase();

              assert(!/lorem ipsum/.test(textAll), "더미 텍스트가 포함되어 있습니다.");
              assert(!/todo|작성하세요\s*$/.test(problem.referenceSolution.toLowerCase()), "referenceSolution이 미완성입니다.");

              const saysMakeType =
                /타입을 만들어|type을 만들어|interface를 만들어|type alias/i.test(problem.title) ||
                /타입을 만들어|type을 만들어|interface를 만들어|type alias/i.test(problem.description);

              const solutionLooksLikeType =
                /\btype\s+\w+\s*=/.test(problem.referenceSolution) ||
                /\binterface\s+\w+\s*\{/.test(problem.referenceSolution);

              if (saysMakeType) {
                assert(solutionLooksLikeType, "설명은 타입 생성 문제인데 정답에 타입 정의가 없습니다.");
              }

              const saysMakeFunction =
                /함수를 작성|함수를 구현|구현하세요|작성하세요/i.test(problem.title) ||
                /함수를 작성|함수를 구현|구현하세요|작성하세요/i.test(problem.description);

              const solutionLooksLikeFunction =
                /\bfunction\b/.test(problem.referenceSolution) || /=>/.test(problem.referenceSolution);

              if (saysMakeFunction) {
                assert(solutionLooksLikeFunction, "설명은 함수 구현 문제인데 정답이 함수 구현 형태가 아닙니다.");
              }

              return {
                title: normalize(problem.title),
                description: normalize(problem.description),
                code: normalize(problem.code),
                requirements: problem.requirements.map((r) => normalize(r)),
                hint: normalize(problem.hint),
                referenceSolution: normalize(problem.referenceSolution),
              };
            }

            async function createChatCompletion(body) {
              const res = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + process.env.OPENAI_API_KEY,
                },
                body: JSON.stringify(body),
              });

              if (!res.ok) {
                const errorText = await res.text();
                throw new Error("OpenAI API 호출 실패: " + errorText);
              }

              return res.json();
            }

            async function generateProblem({ cat, topic, diff, timeLimit }) {
              const developerPrompt = [
                "너는 프론트엔드 코딩테스트 문제 출제기다.",
                "반드시 JSON 스키마에 맞는 값만 반환한다.",
                "문제 설명, 코드, 요구사항, 힌트, referenceSolution은 서로 완전히 일치해야 한다.",
                "모든 요구사항은 반드시 code에 포함된 데이터만으로 해결 가능해야 한다.",
                "code에 없는 필드, 상태, API, 외부 입력, 추가 가정을 요구하면 안 된다.",
                "제목과 설명의 과제 유형은 referenceSolution과 반드시 같아야 한다.",
                "\"타입을 만들어라\"라고 쓰면 반드시 type/interface/type alias를 직접 정의하는 문제여야 한다.",
                "\"함수를 작성하라\"라고 쓰면 반드시 함수 구현 문제여야 한다.",
                "실무 상황 기반으로 만들고, 요구사항은 3~4개만 작성한다.",
                "referenceSolution은 실제로 동작 가능한 정답 코드여야 하며 TODO나 의사코드를 넣지 않는다.",
                "응답 전에 내부적으로 자기검사를 수행하고, 불일치가 있으면 처음부터 다시 작성한다."
              ].join("\n");

              const userPrompt = [
                "프론트엔드 코딩테스트 문제를 하나 만들어줘.",
                "",
                "카테고리: " + cat.emoji + " " + cat.label,
                "주제: " + topic,
                "난이도: " + diff,
                "제한 시간: " + timeLimit,
                "",
                "세부 조건:",
                "- 실무에서 실제로 마주칠 수 있는 상황 기반 (쇼핑몰, 대시보드, 게시판, 채팅, 관리자 페이지 등)",
                "- 문제 코드에는 충분한 데이터(배열, 객체 등)를 포함해서 바로 풀 수 있게 할 것",
                "- 요구사항은 반드시 제공된 코드 데이터로만 해결 가능해야 할 것",
                "- 요구사항끼리 논리적으로 연결되고, 모순이 없어야 할 것",
                "- description은 2~4문장",
                "- code는 복사 후 바로 풀이 가능한 완전한 코드",
                "- hint는 정답을 직접 노출하지 말고 짧은 방향 제시",
                "- referenceSolution은 실제 정답 코드",
                "",
                "잘못된 예시:",
                '- 설명: "제네릭을 활용해 타입을 만들어 보세요"',
                "- 실제 정답: 제네릭 함수만 구현",
                "- 이런 불일치는 절대 허용하지 마라."
              ].join("\n");

              const schema = {
                name: "daily_problem",
                strict: true,
                schema: {
                  type: "object",
                  additionalProperties: false,
                  properties: {
                    title: { type: "string" },
                    description: { type: "string" },
                    code: { type: "string" },
                    requirements: {
                      type: "array",
                      minItems: 3,
                      maxItems: 4,
                      items: { type: "string" }
                    },
                    hint: { type: "string" },
                    referenceSolution: { type: "string" }
                  },
                  required: ["title", "description", "code", "requirements", "hint", "referenceSolution"]
                }
              };

              const data = await createChatCompletion({
                model: "gpt-4o",
                temperature: 0.2,
                response_format: {
                  type: "json_schema",
                  json_schema: schema
                },
                messages: [
                  { role: "developer", content: developerPrompt },
                  { role: "user", content: userPrompt }
                ]
              });

              const content = data?.choices?.[0]?.message?.content;
              assert(content, "생성 응답 content가 비어 있습니다.");

              const parsed = JSON.parse(content);
              return validateProblem(parsed);
            }

            async function reviewProblem(problem, { cat, topic, diff, timeLimit }) {
              const reviewSchema = {
                name: "problem_review",
                strict: true,
                schema: {
                  type: "object",
                  additionalProperties: false,
                  properties: {
                    pass: { type: "boolean" },
                    score: { type: "integer", minimum: 0, maximum: 100 },
                    issues: {
                      type: "array",
                      items: { type: "string" }
                    },
                    fixedProblem: {
                      anyOf: [
                        { type: "null" },
                        {
                          type: "object",
                          additionalProperties: false,
                          properties: {
                            title: { type: "string" },
                            description: { type: "string" },
                            code: { type: "string" },
                            requirements: {
                              type: "array",
                              minItems: 3,
                              maxItems: 4,
                              items: { type: "string" }
                            },
                            hint: { type: "string" },
                            referenceSolution: { type: "string" }
                          },
                          required: ["title", "description", "code", "requirements", "hint", "referenceSolution"]
                        }
                      ]
                    }
                  },
                  required: ["pass", "score", "issues", "fixedProblem"]
                }
              };

              const reviewDeveloperPrompt = [
                "너는 프론트엔드 코딩테스트 문제 검수자다.",
                "입력된 문제의 제목, 설명, 코드, 요구사항, 힌트, 정답 코드가 서로 일치하는지 엄격하게 검수한다.",
                "실무 맥락, 요구사항 충족 가능성, 정답의 실행 가능성, 제목-설명-정답의 일치 여부를 본다.",
                "사소한 문장 수정으로 해결 가능하면 fixedProblem에 수정본을 넣는다.",
                "문제가 크게 어긋나면 pass=false로 내리고 issues에 이유를 적는다.",
                "\"타입을 만들어라\"라고 쓰였는데 정답이 함수 구현이면 반드시 실패 처리한다.",
                "code에 없는 데이터나 전제를 요구하면 반드시 실패 처리한다.",
                "반드시 JSON 스키마에 맞춰 응답한다."
              ].join("\n");

              const reviewUserPrompt = [
                "다음 문제를 검수해줘.",
                "",
                "카테고리: " + cat.label,
                "주제: " + topic,
                "난이도: " + diff,
                "제한 시간: " + timeLimit,
                "",
                "검수 기준:",
                "1. 제목/설명/정답이 같은 과제를 가리키는가",
                "2. 요구사항 3~4개가 모두 code만으로 해결 가능한가",
                "3. referenceSolution이 실제로 요구사항을 만족하는가",
                "4. 힌트가 정답을 너무 직접적으로 노출하지 않는가",
                "5. 난이도와 주제가 자연스러운가",
                "",
                "문제 JSON:",
                JSON.stringify(problem)
              ].join("\n");

              const data = await createChatCompletion({
                model: "gpt-4o",
                temperature: 0,
                response_format: {
                  type: "json_schema",
                  json_schema: reviewSchema
                },
                messages: [
                  { role: "developer", content: reviewDeveloperPrompt },
                  { role: "user", content: reviewUserPrompt }
                ]
              });

              const content = data?.choices?.[0]?.message?.content;
              assert(content, "검수 응답 content가 비어 있습니다.");

              const review = JSON.parse(content);
              assert(typeof review.pass === "boolean", "검수 결과의 pass가 없습니다.");
              assert(typeof review.score === "number", "검수 결과의 score가 없습니다.");
              assert(Array.isArray(review.issues), "검수 결과의 issues가 배열이 아닙니다.");

              if (review.fixedProblem) {
                review.fixedProblem = validateProblem(review.fixedProblem);
              }

              return review;
            }

            // ============================
            // 1. 이전 문제 정답 댓글
            // ============================
            const recentIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "daily-problem",
              state: "all",
              sort: "created",
              direction: "desc",
              per_page: 5,
            });

            if (recentIssues.data.length > 0) {
              const prev = recentIssues.data[0];
              const prevBody = prev.body || "";
              const solMatch = prevBody.match(/<!--SOLUTION\n([\s\S]*?)\n-->/);

              if (solMatch) {
                const comments = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prev.number,
                  per_page: 100,
                });

                const alreadyPosted = comments.data.some((comment) =>
                  (comment.body || "").includes("## 📝 레퍼런스 정답")
                );

                if (!alreadyPosted) {
                  const sol = normalize(solMatch[1]);
                  const commentBody =
                    "## 📝 레퍼런스 정답\n\n"
                    + fence + "typescript\n"
                    + sol + "\n"
                    + fence + "\n\n"
                    + "> 자신의 풀이와 비교해보세요! 다른 접근 방식도 정답일 수 있습니다.";

                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prev.number,
                    body: commentBody,
                  });

                  console.log("이전 문제 #" + prev.number + " 정답 댓글 등록 완료");
                }
              }
            }

            // ============================
            // 2. 오늘 문제 생성 준비
            // ============================
            const categories = [
              {
                id: "typescript", label: "TypeScript",
                emoji: "🔷",
                topics: [
                  "API 응답 타입 설계 및 any 제거",
                  "제네릭을 활용한 재사용 가능한 타입 만들기",
                  "유틸리티 타입(Partial, Pick, Omit, Record) 활용",
                  "유니온 타입과 타입 가드로 안전한 분기 처리",
                  "폼 데이터 타입 설계",
                  "이벤트 핸들러 타입 정의",
                  "discriminated union으로 상태 모델링",
                  "as const와 typeof를 활용한 상수 타입 추론",
                  "mapped type으로 동적 타입 생성",
                  "조건부 타입(Conditional Type) 활용"
                ]
              },
              {
                id: "react", label: "React",
                emoji: "⚛️",
                topics: [
                  "불필요한 리렌더링 원인 분석 및 최적화",
                  "커스텀 훅 구현 (useDebounce, useThrottle, useLocalStorage 등)",
                  "Context API 성능 최적화",
                  "복합 컴포넌트 패턴 구현 (Dropdown, Tab 등)",
                  "무한 스크롤 구현 (IntersectionObserver)",
                  "낙관적 업데이트 패턴 구현",
                  "useReducer로 복잡한 상태 로직 리팩토링",
                  "forwardRef와 useImperativeHandle 활용",
                  "에러 바운더리와 Suspense 활용",
                  "비제어 컴포넌트를 제어 컴포넌트로 전환"
                ]
              },
              {
                id: "nextjs", label: "Next.js",
                emoji: "▲",
                topics: [
                  "서버 컴포넌트 vs 클라이언트 컴포넌트 분리",
                  "동적 라우팅과 params 타입 처리",
                  "미들웨어로 인증 라우트 보호",
                  "서버 액션(Server Actions)으로 폼 처리",
                  "generateMetadata로 동적 SEO",
                  "Route Handler에서 API 설계",
                  "loading, error, not-found 에러 처리 패턴",
                  "캐싱 전략 (revalidate, tags)",
                  "SSR prefetch 패턴",
                  "병렬 라우트 활용"
                ]
              },
              {
                id: "javascript", label: "JavaScript",
                emoji: "⚡",
                topics: [
                  "디바운스 또는 스로틀 직접 구현",
                  "깊은 복사(deep clone) 구현",
                  "Promise.all 또는 Promise.race 구현",
                  "배열 메서드 직접 구현 (map, filter, reduce, flat)",
                  "커링(curry) 함수 구현",
                  "이벤트 이미터(EventEmitter) 구현",
                  "클로저를 활용한 유틸 함수",
                  "this 바인딩 문제 해결",
                  "이벤트 루프 실행 순서 예측",
                  "Proxy로 반응형 객체 구현"
                ]
              },
              {
                id: "algorithm", label: "알고리즘",
                emoji: "🧩",
                topics: [
                  "트리 구조 탐색 (메뉴, 댓글, 폴더)",
                  "다중 조건 정렬",
                  "URL 또는 쿼리스트링 파싱",
                  "DOM 트리 BFS/DFS 순회",
                  "해시맵 빈도 계산",
                  "스택으로 괄호 매칭",
                  "슬라이딩 윈도우",
                  "이진 탐색 응용",
                  "재귀와 메모이제이션",
                  "배열 조합 찾기"
                ]
              }
            ];

            const difficulties = ["Easy", "Medium"];
            const cat = categories[Math.floor(Math.random() * categories.length)];
            const topic = cat.topics[Math.floor(Math.random() * cat.topics.length)];
            const diff = difficulties[Math.floor(Math.random() * difficulties.length)];
            const timeLimit = cat.id === "algorithm" ? "20분" : "15분";

            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: "daily-problem",
              state: "all",
              per_page: 100,
            });

            const dayNum = existingIssues.data.length + 1;
            const dayStr = String(dayNum).padStart(2, "0");

            // ============================
            // 3. 생성 + 검수 (최대 3회 시도)
            // ============================
            let finalProblem = null;
            let lastReview = null;

            for (let attempt = 1; attempt <= 3; attempt++) {
              console.log("문제 생성 시도 #" + attempt);

              const generated = await generateProblem({ cat, topic, diff, timeLimit });
              const review = await reviewProblem(generated, { cat, topic, diff, timeLimit });

              lastReview = review;

              console.log("검수 점수:", review.score);
              console.log("검수 이슈:", review.issues.join(" | ") || "없음");

              if (review.pass) {
                finalProblem = review.fixedProblem || generated;
                console.log("검수 통과");
                break;
              }

              if (!review.pass && review.fixedProblem && review.score >= 85) {
                finalProblem = review.fixedProblem;
                console.log("검수 보정본 채택");
                break;
              }
            }

            assert(finalProblem, "검수 통과 문제를 만들지 못했습니다. 마지막 이슈: " + JSON.stringify(lastReview?.issues || []));

            const problem = finalProblem;
            const diffBadge = diff === "Easy" ? "🟢 Easy" : "🟡 Medium";
            const reqs = problem.requirements.map((r, i) => `${i + 1}. ${r}`).join("\n");

            // ============================
            // 4. README 생성
            // ============================
            const dirPath = path.join("problems", "day" + dayStr);
            fs.mkdirSync(dirPath, { recursive: true });

            const problemMd =
              "# [Day" + dayStr + "] " + cat.emoji + " " + problem.title + "\n\n"
              + "**카테고리:** " + cat.emoji + " " + cat.label + "\n"
              + "**난이도:** " + diffBadge + "\n"
              + "**제한 시간:** " + timeLimit + "\n\n"
              + "---\n\n"
              + "## 문제\n\n"
              + problem.description + "\n\n"
              + "## 코드\n\n"
              + fence + "typescript\n"
              + problem.code + "\n"
              + fence + "\n\n"
              + "## 요구사항\n\n"
              + reqs + "\n\n"
              + "## 힌트\n\n"
              + "<details>\n"
              + "<summary>💡 힌트 보기</summary>\n\n"
              + problem.hint + "\n\n"
              + "</details>\n";

            fs.writeFileSync(path.join(dirPath, "README.md"), problemMd);
            console.log("problems/day" + dayStr + "/README.md 파일 생성 완료");

            // ============================
            // 5. Issue 생성
            // ============================
            const issueBody =
              "## " + problem.title + "\n\n"
              + "**카테고리:** " + cat.emoji + " " + cat.label + "\n"
              + "**난이도:** " + diffBadge + "\n"
              + "**제한 시간:** " + timeLimit + "\n\n"
              + "---\n\n"
              + "### 문제\n\n"
              + problem.description + "\n\n"
              + "### 코드\n\n"
              + fence + "typescript\n"
              + problem.code + "\n"
              + fence + "\n\n"
              + "### 요구사항\n\n"
              + reqs + "\n\n"
              + "### 힌트\n\n"
              + "<details>\n"
              + "<summary>💡 힌트 보기</summary>\n\n"
              + problem.hint + "\n\n"
              + "</details>\n\n"
              + "---\n\n"
              + "> 🤖 이 문제는 AI에 의해 자동 생성되었고, 생성 후 검수 단계를 거쳤습니다.\n"
              + "> 풀이는 PR로 제출해주세요! 정답은 **다음 날 자정**에 댓글로 공개됩니다.\n\n"
              + "<!--SOLUTION\n"
              + problem.referenceSolution + "\n"
              + "-->";

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "[Day" + dayStr + "] " + cat.emoji + " " + cat.label + " " + problem.title,
              body: issueBody,
              labels: ["daily-problem", cat.id, diff.toLowerCase()],
            });

            console.log("Day" + dayStr + " 이슈 생성 완료: " + problem.title);
            core.exportVariable("DAY_STR", dayStr);

      - name: 문제 파일 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add problems/
          git diff --cached --quiet || (git commit -m "📝 Day${DAY_STR} 문제 추가" && git push)
